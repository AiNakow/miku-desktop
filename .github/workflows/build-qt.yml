name: Build MikuPet (Qt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ────────────────────────────────────────────────────
          - os: ubuntu-22.04
            label: linux-x86_64
            cmake_generator: Ninja
            cmake_extra: ""

          # ── Linux aarch64 (native ARM64 runner) ──────────────────────────────
          - os: ubuntu-22.04-arm
            label: linux-aarch64
            cmake_generator: Ninja
            cmake_extra: ""

          # ── Windows x86_64 ──────────────────────────────────────────────────
          - os: windows-latest
            label: windows-x86_64
            cmake_generator: "Visual Studio 17 2022"
            cmake_extra: "-A x64"

          # ── Windows aarch64 ─────────────────────────────────────────────────
          - os: windows-latest
            label: windows-aarch64
            cmake_generator: "Visual Studio 17 2022"
            cmake_extra: "-A ARM64"

          # ── macOS arm64 (Apple Silicon) ───────────────────────────────────────
          - os: macos-latest
            label: macos-arm64
            cmake_generator: Ninja
            cmake_extra: ""

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python deps for icon generation (Pillow) ────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install Pillow

      # ── Linux: install Qt6 + CMake ────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev libgl1-mesa-dev \
            libxkbcommon-dev \
            qt6-base-dev-tools \
            wget imagemagick patchelf file

      # ── macOS: install Qt6 via Homebrew ───────────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja qt6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt6)" >> $GITHUB_ENV

      # ── Windows: install Qt6 via aqtinstall ──────────────────────────────────
      - name: Install Qt6 (Windows x86_64)
        if: matrix.label == 'windows-x86_64'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install Qt6 (Windows aarch64) - host tools
        if: matrix.label == 'windows-aarch64'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          dir: '${{ github.workspace }}/QtHost'
          set-env: false
          extra: '--base https://download.qt.io'
          cache: true

      - name: Install Qt6 (Windows aarch64) - ARM64 target
        if: matrix.label == 'windows-aarch64'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_arm64_cross_compiled'
          dir: '${{ github.workspace }}/Qt'
          set-env: false
          extra: '--base https://download.qt.io'
          cache: true

      - name: Set Qt paths (Windows aarch64)
        if: matrix.label == 'windows-aarch64'
        shell: bash
        run: |
          HOST_ROOT="${{ github.workspace }}/QtHost"
          TARGET_ROOT="${{ github.workspace }}/Qt"

          QT_HOST_PATH="$(find "$HOST_ROOT" -type d -name msvc2022_64 | head -n 1)"
          QT_TARGET_PATH="$(find "$TARGET_ROOT" -type d \( -name msvc2022_arm64_cross_compiled -o -name msvc2022_arm64 \) | head -n 1)"

          if [[ -z "$QT_HOST_PATH" ]]; then
            echo "Could not locate msvc2022_64 under: $HOST_ROOT"
            find "$HOST_ROOT" -maxdepth 4 -type d | sort
            exit 1
          fi

          if [[ -z "$QT_TARGET_PATH" ]]; then
            echo "Could not locate msvc2022_arm64_cross_compiled or msvc2022_arm64 under: $TARGET_ROOT"
            find "$TARGET_ROOT" -maxdepth 5 -type d | sort
            exit 1
          fi

          echo "QT_HOST_PATH=$QT_HOST_PATH" >> $GITHUB_ENV
          echo "QT_TARGET_PATH=$QT_TARGET_PATH" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$QT_TARGET_PATH" >> $GITHUB_ENV

          echo "Resolved QT_HOST_PATH: $QT_HOST_PATH"
          echo "Resolved QT_TARGET_PATH: $QT_TARGET_PATH"

      # ── Configure ────────────────────────────────────────────────────────────
      - name: Configure CMake
        shell: bash
        run: |
          HOST_EXTRA=""
          QT_EXTRA=""
          if [[ -n "${QT_HOST_PATH}" ]]; then
            HOST_EXTRA="-DQT_HOST_PATH=$(cygpath -m "${QT_HOST_PATH}")"
          fi

          if [[ -n "${QT_TARGET_PATH}" ]]; then
            if [[ ! -d "${QT_TARGET_PATH}" ]]; then
              echo "QT_TARGET_PATH does not exist: ${QT_TARGET_PATH}"
              exit 1
            fi
            QT_PREFIX_PATH="$(cygpath -m "${QT_TARGET_PATH}")"
            QT_EXTRA="-DCMAKE_PREFIX_PATH=${QT_PREFIX_PATH} -DQt6_DIR=${QT_PREFIX_PATH}/lib/cmake/Qt6"
          fi

          BUILD_TAG="${GITHUB_REF_NAME}"
          BUILD_VERSION="${BUILD_TAG#v}"

          cmake -B build \
            -G "${{ matrix.cmake_generator }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DMIKUPET_TAG="${BUILD_TAG}" \
            -DMIKUPET_VERSION_OVERRIDE="${BUILD_VERSION}" \
            ${HOST_EXTRA} \
            ${QT_EXTRA} \
            ${{ matrix.cmake_extra }}

      - name: Verify generated icon assets
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            test -f build/generated-icons/windows/mikupet.ico
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            test -f build/generated-icons/macos/mikupet.icns || test -d build/generated-icons/macos/mikupet.iconset
          else
            test -f build/generated-icons/linux/hicolor/256x256/apps/mikupet.png
          fi

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel --config Release

      # ── Deploy Qt runtime ─────────────────────────────────────────────────────
      - name: Deploy Qt runtime (Windows x86_64)
        if: matrix.label == 'windows-x86_64'
        shell: bash
        run: |
          rm -rf build/deploy
          mkdir -p build/deploy
          cp build/Release/MikuPet.exe build/deploy/

          WINDEPLOYQT="$(command -v windeployqt || true)"
          if [[ -z "$WINDEPLOYQT" ]]; then
            WINDEPLOYQT="$(command -v windeployqt6 || true)"
          fi

          if [[ -z "$WINDEPLOYQT" ]]; then
            WINDEPLOYQT="$(find "${{ github.workspace }}" -type f \( -name windeployqt.exe -o -name windeployqt6.exe \) | head -n 1)"
          fi

          if [[ -z "$WINDEPLOYQT" ]]; then
            echo "windeployqt.exe not found"
            exit 1
          fi

          "$WINDEPLOYQT" --release --verbose 2 --compiler-runtime --no-translations build/deploy/MikuPet.exe

      - name: Deploy Qt runtime (Windows aarch64)
        if: matrix.label == 'windows-aarch64'
        shell: bash
        run: |
          rm -rf build/deploy
          mkdir -p build/deploy
          cp build/Release/MikuPet.exe build/deploy/

          if [[ ! -d "${QT_TARGET_PATH}" ]]; then
            echo "QT_TARGET_PATH does not exist: ${QT_TARGET_PATH}"
            exit 1
          fi

          echo "Using ARM64 target path: ${QT_TARGET_PATH}"

          required_qt_dlls=(
            Qt6Core.dll
            Qt6Gui.dll
            Qt6Widgets.dll
          )

          for dll in "${required_qt_dlls[@]}"; do
            if [[ ! -f "${QT_TARGET_PATH}/bin/${dll}" ]]; then
              echo "Required ARM64 Qt DLL missing: ${QT_TARGET_PATH}/bin/${dll}"
              exit 1
            fi
            cp "${QT_TARGET_PATH}/bin/${dll}" build/deploy/
          done

          for runtime_dll in opengl32sw.dll d3dcompiler_47.dll dxcompiler.dll dxil.dll; do
            if [[ -f "${QT_TARGET_PATH}/bin/${runtime_dll}" ]]; then
              cp "${QT_TARGET_PATH}/bin/${runtime_dll}" build/deploy/
            fi
          done

          mkdir -p build/deploy/platforms
          if [[ ! -f "${QT_TARGET_PATH}/plugins/platforms/qwindows.dll" ]]; then
            echo "Required ARM64 platform plugin missing: ${QT_TARGET_PATH}/plugins/platforms/qwindows.dll"
            exit 1
          fi
          cp "${QT_TARGET_PATH}/plugins/platforms/qwindows.dll" build/deploy/platforms/

          if [[ -d "${QT_TARGET_PATH}/plugins/imageformats" ]]; then
            mkdir -p "build/deploy/imageformats"
            for image_plugin in qico.dll qjpeg.dll qgif.dll qwebp.dll qsvg.dll; do
              if [[ -f "${QT_TARGET_PATH}/plugins/imageformats/${image_plugin}" ]]; then
                cp "${QT_TARGET_PATH}/plugins/imageformats/${image_plugin}" "build/deploy/imageformats/"
              fi
            done
          fi

          if [[ -d "${QT_TARGET_PATH}/plugins/iconengines" ]]; then
            mkdir -p "build/deploy/iconengines"
            for icon_plugin in qsvgicon.dll; do
              if [[ -f "${QT_TARGET_PATH}/plugins/iconengines/${icon_plugin}" ]]; then
                cp "${QT_TARGET_PATH}/plugins/iconengines/${icon_plugin}" "build/deploy/iconengines/"
              fi
            done
          fi

          if [[ -d "${QT_TARGET_PATH}/plugins/styles" ]]; then
            mkdir -p "build/deploy/styles"
            for style_plugin in qmodernwindowsstyle.dll qwindowsvistastyle.dll; do
              if [[ -f "${QT_TARGET_PATH}/plugins/styles/${style_plugin}" ]]; then
                cp "${QT_TARGET_PATH}/plugins/styles/${style_plugin}" "build/deploy/styles/"
              fi
            done
          fi

      - name: Validate deployed arch (Windows aarch64)
        if: matrix.label == 'windows-aarch64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Get-MachineType {
            param([string]$FilePath)

            $bytes = [System.IO.File]::ReadAllBytes($FilePath)
            if ($bytes.Length -lt 0x100) { return 'Unknown' }

            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            if ($peOffset + 6 -gt $bytes.Length) { return 'Unknown' }
            if ($bytes[$peOffset] -ne 0x50 -or $bytes[$peOffset + 1] -ne 0x45) { return 'Unknown' }

            $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            switch ($machine) {
              0xAA64 { 'ARM64' }
              0x8664 { 'x64' }
              0x014C { 'x86' }
              default { ('0x{0:X4}' -f $machine) }
            }
          }

          $files = Get-ChildItem -Path 'build/deploy/*' -File -Include *.exe,*.dll
          $report = foreach ($file in $files) {
            [PSCustomObject]@{
              File = $file.Name
              Arch = Get-MachineType -FilePath $file.FullName
            }
          }

          $report | Sort-Object File | Format-Table -AutoSize

          $bad = $report | Where-Object { $_.Arch -ne 'ARM64' }
          if ($bad) {
            $bad | Format-Table -AutoSize
            throw 'Found non-ARM64 binaries in windows-aarch64 deploy output. Packaging is blocked.'
          }

      - name: Package portable bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/deploy/* -DestinationPath build/MikuPet-${{ github.ref_name }}-${{ matrix.label }}-portable.zip -Force

      - name: Deploy Qt runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/MikuPet.app -codesign=-
          codesign --force --deep --sign - --timestamp=none build/MikuPet.app
          codesign --verify --deep --strict --verbose=2 build/MikuPet.app
          rm -rf build/dmg-root
          mkdir -p build/dmg-root
          ditto build/MikuPet.app build/dmg-root/MikuPet.app
          rm -f build/MikuPet.dmg
          hdiutil create \
            -volname "MikuPet" \
            -srcfolder build/dmg-root \
            -ov -format UDZO \
            build/MikuPet.dmg
          rm -rf build/dmg-mount
          mkdir -p build/dmg-mount
          hdiutil attach build/MikuPet.dmg -nobrowse -readonly -mountpoint build/dmg-mount
          codesign --verify --deep --strict --verbose=2 build/dmg-mount/MikuPet.app
          hdiutil detach build/dmg-mount

      - name: Create AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          APPIMAGE_ARCH=""
          case "$(uname -m)" in
            x86_64|amd64)
              APPIMAGE_ARCH="x86_64"
              ;;
            aarch64|arm64)
              APPIMAGE_ARCH="aarch64"
              ;;
            *)
              echo "Unsupported Linux architecture: $(uname -m)"
              exit 1
              ;;
          esac

          LINUXDEPLOY_BIN="linuxdeploy-${APPIMAGE_ARCH}.AppImage"
          LINUXDEPLOY_QT_PLUGIN="linuxdeploy-plugin-qt-${APPIMAGE_ARCH}.AppImage"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/${LINUXDEPLOY_BIN}"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/${LINUXDEPLOY_QT_PLUGIN}"

          chmod +x "${LINUXDEPLOY_BIN}" "${LINUXDEPLOY_QT_PLUGIN}"

          cmake --install build --prefix AppDir/usr

          ICON_FILE="build/generated-icons/linux/hicolor/256x256/apps/mikupet.png"
          DESKTOP_FILE="build/mikupet.desktop"
          if [[ ! -f "${ICON_FILE}" ]]; then
            echo "Expected icon missing: ${ICON_FILE}"
            exit 1
          fi
          if [[ ! -f "${DESKTOP_FILE}" ]]; then
            echo "Expected desktop file missing: ${DESKTOP_FILE}"
            exit 1
          fi

          QMAKE_BIN="$(command -v qmake6 || command -v qmake || true)"
          if [[ -z "${QMAKE_BIN}" && -x "/usr/lib/qt6/bin/qmake" ]]; then
            QMAKE_BIN="/usr/lib/qt6/bin/qmake"
          fi

          if [[ -z "${QMAKE_BIN}" ]]; then
            echo "qmake/qmake6 not found"
            exit 1
          fi

          export QMAKE="${QMAKE_BIN}"
          export APPIMAGE_EXTRACT_AND_RUN=1

          "./${LINUXDEPLOY_BIN}" \
            --appdir AppDir \
            --executable AppDir/usr/bin/MikuPet \
            --desktop-file "${DESKTOP_FILE}" \
            --icon-file "${ICON_FILE}" \
            --plugin qt \
            --output appimage

          APPIMAGE_FILE="$(ls -1 MikuPet*.AppImage | head -n 1)"
          if [[ -z "${APPIMAGE_FILE}" || ! -f "${APPIMAGE_FILE}" ]]; then
            echo "AppImage was not produced"
            exit 1
          fi

          mkdir -p build/deploy
          cp "${APPIMAGE_FILE}" "build/deploy/"
        env:
          VERSION: ${{ github.ref_name }}

      # ── Package (CPack) ───────────────────────────────────────────────────────
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y --no-progress

      - name: Package (CPack)
        if: runner.os == 'Windows' || runner.os == 'Linux'
        working-directory: build
        run: cpack -C Release

      # ── Upload artifacts ───────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: miku-pet-${{ github.ref_name }}-${{ matrix.label }}
          path: |
            build/deploy/
            build/*.msi
            build/*-portable.zip
            build/*.deb
            build/*.rpm
            build/*.tar.xz
            build/*.dmg
            MikuPet*.AppImage
          if-no-files-found: ignore
          retention-days: 14

      # ── Create GitHub Release on tag ──────────────────────────────────────────
      - name: Collect release files
        if: startsWith(github.ref, 'refs/tags/')
        id: release_files
        shell: bash
        run: |
          files=()

          add_if_exists() {
            local path="$1"
            if [[ -f "$path" ]]; then
              files+=("$path")
            fi
          }

          add_glob_files() {
            local pattern="$1"
            shopt -s nullglob
            for path in $pattern; do
              [[ -f "$path" ]] && files+=("$path")
            done
            shopt -u nullglob
          }

          add_if_exists "build/MikuPet-${{ github.ref_name }}-${{ matrix.label }}-portable.zip"
          add_glob_files "build/*.exe"
          add_glob_files "build/*.deb"
          add_glob_files "build/*.rpm"
          add_glob_files "build/*.tar.xz"
          add_glob_files "build/*.dmg"
          add_glob_files "MikuPet*.AppImage"

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ steps.release_files.outputs.files }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
