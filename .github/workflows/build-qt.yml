name: Build MikuPet (Qt)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ────────────────────────────────────────────────────
          - os: ubuntu-22.04
            label: linux-x86_64
            cmake_generator: Ninja
            cmake_extra: ""

          # ── Linux aarch64 (native ARM64 runner) ──────────────────────────────
          - os: ubuntu-22.04-arm
            label: linux-aarch64
            cmake_generator: Ninja
            cmake_extra: ""

          # ── Windows x86_64 ──────────────────────────────────────────────────
          - os: windows-latest
            label: windows-x86_64
            cmake_generator: "Visual Studio 17 2022"
            cmake_extra: "-A x64"

          # ── Windows aarch64 ─────────────────────────────────────────────────
          - os: windows-latest
            label: windows-aarch64
            cmake_generator: "Visual Studio 17 2022"
            cmake_extra: "-A ARM64"

          # ── macOS arm64 (Apple Silicon) ───────────────────────────────────────
          - os: macos-latest
            label: macos-arm64
            cmake_generator: Ninja
            cmake_extra: ""

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.label }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Linux: install Qt6 + CMake ────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            qt6-base-dev libgl1-mesa-dev \
            libxkbcommon-dev \
            qt6-base-dev-tools

      # ── macOS: install Qt6 via Homebrew ───────────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja qt6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt6)" >> $GITHUB_ENV

      # ── Windows: install Qt6 via aqtinstall ──────────────────────────────────
      - name: Install Qt6 (Windows x86_64)
        if: matrix.label == 'windows-x86_64'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Install Qt6 (Windows aarch64) - x64 host tools
        if: matrix.label == 'windows-aarch64'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          dir: '${{ github.workspace }}/QtHost'
          set-env: false
          extra: '--base https://download.qt.io'
          cache: true

      - name: Install Qt6 (Windows aarch64) - arm64 target
        if: matrix.label == 'windows-aarch64'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_arm64_cross_compiled'
          dir: '${{ github.workspace }}/Qt'
          set-env: false
          extra: '--base https://download.qt.io'
          cache: true

      - name: Set Qt paths (Windows aarch64)
        if: matrix.label == 'windows-aarch64'
        shell: bash
        run: |
          echo "QT_HOST_PATH=${{ github.workspace }}/QtHost/Qt/6.8.1/msvc2022_64" >> $GITHUB_ENV
          echo "QT_TARGET_PATH=${{ github.workspace }}/Qt/Qt/6.8.1/msvc2022_arm64_cross_compiled" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/Qt/6.8.1/msvc2022_arm64_cross_compiled" >> $GITHUB_ENV

      # ── Configure ────────────────────────────────────────────────────────────
      - name: Configure CMake
        shell: bash
        run: |
          HOST_EXTRA=""
          if [[ -n "${QT_HOST_PATH}" ]]; then
            HOST_EXTRA="-DQT_HOST_PATH=$(cygpath -m "${QT_HOST_PATH}")"
          fi

          BUILD_TAG="${GITHUB_REF_NAME}"
          BUILD_VERSION="${BUILD_TAG#v}"

          cmake -B build \
            -G "${{ matrix.cmake_generator }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DMIKUPET_TAG="${BUILD_TAG}" \
            -DMIKUPET_VERSION_OVERRIDE="${BUILD_VERSION}" \
            ${HOST_EXTRA} \
            ${{ matrix.cmake_extra }}

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel --config Release

      # ── Deploy Qt runtime ─────────────────────────────────────────────────────
      - name: Deploy Qt runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p build/deploy
          cp build/Release/MikuPet.exe build/deploy/

          WINDEPLOYQT=""
          QT_PATHS_ARG=""
          if [[ "${{ matrix.label }}" == "windows-aarch64" ]]; then
            HOST_WINDEPLOYQT="${{ github.workspace }}/QtHost/Qt/6.8.1/msvc2022_64/bin/windeployqt.exe"
            QT_PATHS="${QT_TARGET_PATH}/bin/qtpaths.exe"

            if [[ -f "$QT_PATHS" ]]; then
              QT_PATHS_ARG="--qtpaths $(cygpath -m "$QT_PATHS")"
            else
              echo "ARM64 qtpaths.exe not found: $QT_PATHS"
              exit 1
            fi

            if [[ -f "$HOST_WINDEPLOYQT" ]]; then
              WINDEPLOYQT="$HOST_WINDEPLOYQT"
            else
              echo "Host windeployqt.exe not found for ARM64 deployment: $HOST_WINDEPLOYQT"
              exit 1
            fi

            echo "Using ARM64 target path: ${QT_TARGET_PATH}"
            echo "Using host windeployqt: ${WINDEPLOYQT}"
            echo "Using target qtpaths: ${QT_PATHS}"
          fi

          if [[ -z "$WINDEPLOYQT" ]]; then
            WINDEPLOYQT="$(command -v windeployqt || true)"
          fi

          if [[ -z "$WINDEPLOYQT" ]]; then
            WINDEPLOYQT="$(find "${{ github.workspace }}" -type f -name windeployqt.exe | head -n 1)"
          fi

          if [[ -z "$WINDEPLOYQT" ]]; then
            echo "windeployqt.exe not found"
            exit 1
          fi

          "$WINDEPLOYQT" --release --verbose 2 --compiler-runtime --no-translations ${QT_PATHS_ARG} build/deploy/MikuPet.exe

      - name: Validate deployed arch (Windows aarch64)
        if: matrix.label == 'windows-aarch64'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Get-MachineType {
            param([string]$FilePath)

            $bytes = [System.IO.File]::ReadAllBytes($FilePath)
            if ($bytes.Length -lt 0x100) { return 'Unknown' }

            $peOffset = [BitConverter]::ToInt32($bytes, 0x3C)
            if ($peOffset + 6 -gt $bytes.Length) { return 'Unknown' }
            if ($bytes[$peOffset] -ne 0x50 -or $bytes[$peOffset + 1] -ne 0x45) { return 'Unknown' }

            $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
            switch ($machine) {
              0xAA64 { 'ARM64' }
              0x8664 { 'x64' }
              0x014C { 'x86' }
              default { ('0x{0:X4}' -f $machine) }
            }
          }

          $files = Get-ChildItem -Path 'build/deploy/*' -File -Include *.exe,*.dll
          $report = foreach ($file in $files) {
            [PSCustomObject]@{
              File = $file.Name
              Arch = Get-MachineType -FilePath $file.FullName
            }
          }

          $bad = $report | Where-Object { $_.Arch -eq 'x64' -or $_.Arch -eq 'x86' }
          if ($bad) {
            $bad | Format-Table -AutoSize
            throw 'Found non-ARM64 binaries in windows-aarch64 deploy output.'
          }

      - name: Package portable bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/deploy/* -DestinationPath build/MikuPet-${{ github.ref_name }}-${{ matrix.label }}-portable.zip -Force

      - name: Deploy Qt runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          macdeployqt build/MikuPet.app -codesign=-
          codesign --force --deep --sign - --timestamp=none build/MikuPet.app
          codesign --verify --deep --strict --verbose=2 build/MikuPet.app
          rm -rf build/dmg-root
          mkdir -p build/dmg-root
          ditto build/MikuPet.app build/dmg-root/MikuPet.app
          rm -f build/MikuPet.dmg
          hdiutil create \
            -volname "MikuPet" \
            -srcfolder build/dmg-root \
            -ov -format UDZO \
            build/MikuPet.dmg
          rm -rf build/dmg-mount
          mkdir -p build/dmg-mount
          hdiutil attach build/MikuPet.dmg -nobrowse -readonly -mountpoint build/dmg-mount
          codesign --verify --deep --strict --verbose=2 build/dmg-mount/MikuPet.app
          hdiutil detach build/dmg-mount

      - name: Create AppImage (Linux x86_64)
        if: matrix.label == 'linux-x86_64'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          cmake --install build --prefix AppDir/usr
          # Resize sprite to a standard 256x256 icon size required by linuxdeploy
          convert drawable-hdpi/def01.png -resize 256x256 MikuPet.png
          # Create a minimal .desktop file required by linuxdeploy
          cat > MikuPet.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=MikuPet
          Exec=MikuPet
          Icon=MikuPet
          Categories=Utility;
          EOF
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/MikuPet \
            --desktop-file MikuPet.desktop \
            --icon-file MikuPet.png \
            --plugin qt \
            --output appimage
        env:
          QMAKE: /usr/lib/qt6/bin/qmake
          VERSION: ${{ github.ref_name }}

      # ── Package (CPack) ───────────────────────────────────────────────────────
      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y --no-progress

      - name: Package (CPack)
        if: runner.os == 'Windows' || runner.os == 'Linux'
        working-directory: build
        run: cpack -C Release

      # ── Upload artifacts ───────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: miku-pet-${{ github.ref_name }}-${{ matrix.label }}
          path: |
            build/deploy/
            build/*.msi
            build/*-portable.zip
            build/*.deb
            build/*.rpm
            build/*.tar.xz
            build/*.dmg
            MikuPet*.AppImage
          if-no-files-found: ignore
          retention-days: 14

      # ── Create GitHub Release on tag ──────────────────────────────────────────
      - name: Collect release files
        if: startsWith(github.ref, 'refs/tags/')
        id: release_files
        shell: bash
        run: |
          files=()

          add_if_exists() {
            local path="$1"
            if [[ -f "$path" ]]; then
              files+=("$path")
            fi
          }

          add_glob_files() {
            local pattern="$1"
            shopt -s nullglob
            for path in $pattern; do
              [[ -f "$path" ]] && files+=("$path")
            done
            shopt -u nullglob
          }

          add_if_exists "build/MikuPet-${{ github.ref_name }}-${{ matrix.label }}-portable.zip"
          add_glob_files "build/*.exe"
          add_glob_files "build/*.deb"
          add_glob_files "build/*.rpm"
          add_glob_files "build/*.tar.xz"
          add_glob_files "build/*.dmg"
          add_glob_files "MikuPet*.AppImage"

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ steps.release_files.outputs.files }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
